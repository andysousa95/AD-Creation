<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Acessos</title>

<link rel="stylesheet" href="painel.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="choice-container">

    <div class="title">
        O que você deseja fazer?
    </div>

    <div class="choice-grid">

        <div class="choice-card" id="meus-acessos">
            <h3>Ver Meus Acessos</h3>
            <p>Consultar os acessos que você possui atualmente</p>
        </div>

        <div class="choice-card" id="solicitar-acesso">
            <h3>Solicitar Novo Acesso</h3>
            <p>Solicitar acesso a sistemas ou grupos</p>
        </div>

        <div class="choice-card" id="solicitar-outros">
            <h3>Solicitar para Outra Pessoa</h3>
            <p>Solicitar acesso para outro colaborador</p>
        </div>

    </div>

    <button class ="btn-voltar" onclick="voltar()">← Voltar</button>

</div>

<script src="painel.js"></script>

</body>
</html>
